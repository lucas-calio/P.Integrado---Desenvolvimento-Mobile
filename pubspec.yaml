name: stox
description: "A new Flutter project."
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0 
  path: ^1.9.0 
  connectivity_plus: ^6.1.5
  # Substituído para evitar erros de Gradle/Namespace
  mobile_scanner: ^5.0.0 
  audioplayers: ^6.6.0
  vibration: ^3.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 

flutter:
  uses-material-design: true
  assets:
    - assets/images/Logo_colorida.png
    - assets/images/sap-logo.png
    - assets/sounds/error_beep.mp3
    - assets/sounds/beep.mp3
    - assets/sounds/fail.mp3
    - assets/sounds/check.mp3